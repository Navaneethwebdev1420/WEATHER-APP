<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="Enter city name..." id="city-input">
            <button id="search-btn">Search</button>
        </div>

        <div class="weather-card" id="weather-card">
            <h2 id="city-name">London</h2>
            <img src="https://openweathermap.org/img/wn/01d@2x.png" alt="weather-icon" id="weather-icon">
            <h1 id="temp">20°C</h1>
            <p id="description">Clear Sky</p>
            
            <div class="details">
                <div class="col">
                    <p>Humidity</p>
                    <p id="humidity">50%</p>
                </div>
                <div class="col">
                    <p>Wind Speed</p>
                    <p id="wind">15 km/h</p>
                </div>
            </div>
        </div>

        <div class="error-msg" id="error-msg">City not found. Please try again.</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
